<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Random Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-success d-flex justify-content-center align-items-center vh-100">

  <div id="card" class="card" style="width:400px; height:600px;">
  <div class="card-body position-relative d-flex justify-content-center align-items-center">

    <div class="top position-absolute top-0 start-0 fs-1 p-3"></div>

    <div class="number display-1"></div>

    <div class="bottom position-absolute bottom-0 end-0 fs-1 p-3"></div>

  </div>
</div>

  <script src="app.js"></script>
</body>

</html>
